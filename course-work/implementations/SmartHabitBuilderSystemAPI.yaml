        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryReadDto"

    post:
      tags: [Categories]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateDto"
      responses:
        "201":
          description: Category created
        "400":
          description: Validation error

  /Categories/{id}:
    get:
      tags: [Categories]
      summary: Get category by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Category details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryReadDto"
        "403":
          description: Forbidden
        "404":
          description: Category not found

    put:
      tags: [Categories]
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdateDto"
      responses:
        "204":
          description: Category updated
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Category not found

    delete:
      tags: [Categories]
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Category deleted
        "403":
          description: Forbidden
        "404":
          description: Category not found

  /Goals:
    get:
      tags: [Goals]
      summary: Get all goals
      security:
        - bearerAuth: []
      parameters:
        - name: HabitId
          in: query
          schema:
            type: integer
        - name: Title
          in: query
          schema:
            type: string
        - name: IsCompleted
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalReadDto"

    post:
      tags: [Goals]
      summary: Create goal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalCreateDto"
      responses:
        "201":
          description: Goal created
        "400":
          description: Validation error
        "403":
          description: Habit does not belong to current user

  /Goals/{id}:
    get:
      tags: [Goals]
      summary: Get goal by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Goal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalReadDto"
        "403":
          description: Forbidden
        "404":
          description: Goal not found

    put:
      tags: [Goals]
      summary: Update goal
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdateDto"
      responses:
        "204":
          description: Goal updated
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Goal not found

    delete:
      tags: [Goals]
      summary: Delete goal
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Goal deleted
        "403":
          description: Forbidden
        "404":
          description: Goal not found

  /Logs:
    get:
      tags: [Logs]
      summary: Get all logs
      security:
        - bearerAuth: []
      parameters:
        - name: HabitId
          in: query
          schema:
            type: integer
        - name: Status
          in: query
          schema:
            $ref: "#/components/schemas/HabitStatus"
        - name: FromDate
          in: query
          schema:
            type: string
            format: date-time
        - name: ToDate
          in: query
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogReadDto"

    post:
      tags: [Logs]
      summary: Create log
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogCreateDto"
      responses:
        "201":
          description: Log created
        "400":
          description: Validation error
        "403":
          description: Habit does not belong to current user

  /Logs/{id}:
    get:
      tags: [Logs]
      summary: Get log by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Log details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogReadDto"
        "403":
          description: Forbidden
        "404":
          description: Log not found

    put:
      tags: [Logs]
      summary: Update log
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogUpdateDto"
      responses:
        "204":
          description: Log updated
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Log not found

    delete:
      tags: [Logs]
      summary: Delete log
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Log deleted
        "403":
          description: Forbidden
        "404":
          description: Log not found

  /Reminders:
    get:
      tags: [Reminders]
      summary: Get all reminders
      security:
        - bearerAuth: []
      parameters:
        - name: HabitId
          in: query
          schema:
            type: integer
        - name: Message
          in: query
          schema:
            type: string
        - name: IsEnabled
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReminderReadDto"

    post:
      tags: [Reminders]
      summary: Create reminder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderCreateDto"
      responses:
        "201":
          description: Reminder created
        "400":
          description: Validation error
        "403":
          description: Habit does not belong to current user

  /Reminders/{id}:
    get:
      tags: [Reminders]
      summary: Get reminder by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Reminder details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderReadDto"
        "403":
          description: Forbidden
        "404":
          description: Reminder not found

    put:
      tags: [Reminders]
      summary: Update reminder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderUpdateDto"
      responses:
        "204":
          description: Reminder updated
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Reminder not found

    delete:
      tags: [Reminders]
      summary: Delete reminder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Reminder deleted
        "403":
          description: Forbidden
        "404":
          description: Reminder not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    Username:
      name: Username
      in: query
      schema:
        type: string

    Email:
      name: Email
      in: query
      schema:
        type: string
        format: email

    SortBy:
      name: SortBy
      in: query
      schema:
        type: string

    Descending:
      name: Descending
      in: query
      schema:
        type: boolean
        default: false

    PageNumber:
      name: PageNumber
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: PageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token

    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserCreateDto:
      type: object
      required:
        - username
        - email
        - passwordHash
      properties:
        username:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        passwordHash:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time

    UserUpdateDto:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        passwordHash:
          type: string
          maxLength: 255

    UserReadDto:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    HabitCreateDto:
      type: object
      required:
        - name
        - targetCount
        - frequency
        - categoryId
        - difficultyLevel
        - priority
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 300
          nullable: true
        targetCount:
          type: integer
          minimum: 1
          maximum: 100
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        startDate:
          type: string
          format: date-time
        isActive:
          type: boolean
          default: true
        categoryId:
          type: integer
          minimum: 1
        difficultyLevel:
          type: integer
          minimum: 1
          maximum: 5
        priority:
          $ref: "#/components/schemas/HabitPriority"
        endDate:
          type: string
          format: date-time
          nullable: true

    HabitUpdateDto:
      type: object
      required:
        - name
        - targetCount
        - frequency
        - categoryId
        - difficultyLevel
        - priority
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 300
          nullable: true
        targetCount:
          type: integer
          minimum: 1
          maximum: 100
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        startDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        categoryId:
          type: integer
          minimum: 1
        difficultyLevel:
          type: integer
          minimum: 1
          maximum: 5
        priority:
          $ref: "#/components/schemas/HabitPriority"
        endDate:
          type: string
          format: date-time
          nullable: true

    HabitReadDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        targetCount:
          type: integer
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        startDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        userId:
          type: integer
        categoryId:
          type: integer
        difficultyLevel:
          type: integer
        priority:
          $ref: "#/components/schemas/HabitPriority"
        endDate:
          type: string
          format: date-time
          nullable: true

    CategoryCreateDto:
      type: object
      required:
        - name
        - color
      properties:
        name:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 200
          nullable: true
        color:
          type: string
          maxLength: 7
          pattern: "^#([A-Fa-f0-9]{6})$"
          example: "#7E57C2"
        isDefault:
          type: boolean
        displayOrder:
          type: integer

    CategoryUpdateDto:
      type: object
      required:
        - name
        - color
      properties:
        name:
          type: string
          maxLength: 50
        description:
          type: string
          maxLength: 200
          nullable: true
        color:
          type: string
          maxLength: 7
          pattern: "^#([A-Fa-f0-9]{6})$"
          example: "#7E57C2"
        isDefault:
          type: boolean
        displayOrder:
          type: integer

    CategoryReadDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          example: "#7E57C2"
        createdAt:
          type: string
          format: date-time
        isDefault:
          type: boolean
        displayOrder:
          type: integer

    GoalCreateDto:
      type: object
      required:
        - habitId
        - title
        - deadline
      properties:
        habitId:
          type: integer
          minimum: 1
        title:
          type: string
          maxLength: 100
        targetValue:
          type: integer
          minimum: 1
          maximum: 365
        deadline:
          type: string
          format: date-time
        isCompleted:
          type: boolean

    GoalUpdateDto:
      type: object
      required:
        - habitId
        - title
        - deadline
      properties:
        habitId:
          type: integer
          minimum: 1
        title:
          type: string
          maxLength: 100
        targetValue:
          type: integer
          minimum: 1
          maximum: 365
        deadline:
          type: string
          format: date-time
        isCompleted:
          type: boolean

    GoalReadDto:
      type: object
      properties:
        id:
          type: integer
        habitId:
          type: integer
        title:
          type: string
        targetValue:
          type: integer
        deadline:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        currentProgress:
          type: integer
        progressPercentage:
          type: number
          format: double
          readOnly: true

    LogCreateDto:
      type: object
      required:
        - habitId
        - status
      properties:
        habitId:
          type: integer
          minimum: 1
        logDate:
          type: string
          format: date-time
        completedCount:
          type: integer
          minimum: 0
          maximum: 100
        moodRating:
          type: integer
          minimum: 1
          maximum: 5
        note:
          type: string
          maxLength: 250
          nullable: true
        durationMinutes:
          type: integer
          minimum: 0
          maximum: 1440
          nullable: true
        status:
          $ref: "#/components/schemas/HabitStatus"

    LogUpdateDto:
      type: object
      required:
        - habitId
        - status
      properties:
        habitId:
          type: integer
