openapi: 3.0.3
info:
  title: Smart Habit Builder System API
  version: 1.0.0
  description: |
    Smart Habit Builder System is a planned software system for habit tracking and productivity management.

    The project will consist of two main parts:
    - Back-end REST API developed with ASP.NET Core Web API
    - Front-end client application developed with ASP.NET Core MVC

    The system is planned to support full CRUD operations for the following entities:
    - Users
    - Habits
    - Habit Categories
    - Habit Goals
    - Habit Logs
    - Habit Reminders

    Planned architecture and technologies:
    - Entity Framework Core for database access
    - SQL Server relational database
    - Repository Pattern for abstraction of data access logic
    - Generic repositories for common CRUD operations
    - Specialized repositories for filtering and business-specific operations
    - AutoMapper for object mapping between entities and DTO models
    - DTO models for request and response separation
    - JWT Bearer Authentication for secure access control

    The API is planned to include:
    - User registration and authentication
    - Authorization based on JWT tokens
    - Filtering through query parameters
    - Sorting functionality
    - Pagination support
    - Validation of incoming data
    - User-specific resource protection

    Filtering and pagination functionality will be implemented through query parameters such as:
    - Name
    - Email
    - HabitId
    - CategoryId
    - Status
    - IsCompleted
    - IsEnabled
    - SortBy
    - Descending
    - PageNumber
    - PageSize

    Validation rules are expected to include:
    - Required fields
    - Maximum string lengths
    - Numeric range validation
    - Enum validation
    - Email format validation
    - Date and time validation

    The API documentation is written using OpenAPI 3.0.3 specification
    and can be validated through Swagger Editor.

servers:
  - url: https://localhost:7043/api 

tags:
  - name: Auth
  - name: Users
  - name: Habits
  - name: Categories
  - name: Goals
  - name: Logs
  - name: Reminders

paths:
  /Auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
        "401":
          description: Invalid credentials

  /Users:
    get:
      tags: [Users]
      summary: Get all users
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Username"
        - $ref: "#/components/parameters/Email"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserReadDto"
        "401":
          description: Unauthorized

    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
      responses:
        "201":
          description: User created
        "400":
          description: Validation error

  /Users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReadDto"
        "403":
          description: Forbidden
        "404":
          description: User not found

    put:
      tags: [Users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDto"
      responses:
        "204":
          description: User updated
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: User not found

    delete:
      tags: [Users]
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: User deleted
        "403":
          description: Forbidden
        "404":
          description: User not found

  /Habits:
    get:
      tags: [Habits]
      summary: Get all habits
      security:
        - bearerAuth: []
      parameters:
        - name: Name
          in: query
          schema:
            type: string
        - name: Description
          in: query
          schema:
            type: string
        - name: TargetCount
          in: query
          schema:
            type: integer
        - name: Frequency
          in: query
          schema:
            $ref: "#/components/schemas/FrequencyType"
        - name: IsActive
          in: query
          schema:
            type: boolean
        - name: CategoryId
          in: query
          schema:
            type: integer
        - name: DifficultyLevel
          in: query
          schema:
            type: integer
        - name: Priority
          in: query
          schema:
            $ref: "#/components/schemas/HabitPriority"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/Descending"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HabitReadDto"

    post:
      tags: [Habits]
      summary: Create habit
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HabitCreateDto"
      responses:
        "201":
          description: Habit created
        "400":
          description: Validation error
        "403":
          description: Category does not belong to current user

  /Habits/{id}:
    get:
      tags: [Habits]
      summary: Get habit by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Habit details
          content:
            application/json:
              schema:
