        "403":
          description: Forbidden
        "404":
          description: Habit not found

    put:
      tags: [Habits]
      summary: Update habit
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
